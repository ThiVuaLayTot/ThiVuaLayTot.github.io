layout: default
title: Lịch sự kiện của tháng - Thí Vua Lấy Tốt
---

<style>
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
 
        .calendar-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
 
        .calendar-header {
            background: linear-gradient(135deg, #0066cc 0%, #00ccff 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
 
        .calendar-header h1 {
            font-size: 2.5em;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
 
        .calendar-body {
            padding: 30px 20px;
        }
 
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }
 
        .weekday {
            text-align: center;
            font-weight: bold;
            color: #0066cc;
            padding: 15px;
            text-transform: uppercase;
            font-size: 1.1em;
            letter-spacing: 2px;
            border-bottom: 3px solid #0066cc;
        }
 
        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 15px;
        }
 
        .day {
            aspect-ratio: 1;
            border: 2px solid #0066cc;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            min-height: 140px;
        }
 
        .day:hover {
            border-color: #00ccff;
            background: #e6f7ff;
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 102, 204, 0.2);
        }
 
        .day.other-month {
            background: #f5f5f5;
            border-color: #ddd;
        }
 
        .day.other-month .day-number {
            color: #ccc;
        }
 
        .day.today {
            background: #fff3cd;
            border-color: #ff9800;
            border-width: 3px;
        }
 
        .day.today .day-number {
            color: #ff9800;
            font-weight: bold;
            font-size: 1.3em;
        }
 
        .day-number {
            font-weight: bold;
            color: #0066cc;
            font-size: 1.2em;
            margin-bottom: 8px;
        }
 
        .day-events {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow: hidden;
        }
 
        .event-badge {
            background: linear-gradient(135deg, #0066cc 0%, #00ccff 100%);
            color: white;
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
 
        .event-badge:hover {
            background: linear-gradient(135deg, #00ccff 0%, #0066cc 100%);
            transform: scale(1.05);
        }
 
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.3s;
        }
 
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
 
        .modal-content {
            background: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s;
        }
 
        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
 
        .close-modal {
            color: #999;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
 
        .close-modal:hover {
            color: #0066cc;
        }
 
        .modal-header {
            border-bottom: 3px solid #0066cc;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
 
        .modal-header h2 {
            color: #0066cc;
            margin: 0;
            font-size: 1.5em;
        }
 
        .modal-body {
            line-height: 1.8;
        }
 
        .modal-body p {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }
 
        .modal-body strong {
            color: #0066cc;
            display: inline-block;
            min-width: 100px;
            font-weight: bold;
        }
 
        .modal-body i {
            color: #0066cc;
            margin-right: 15px;
            min-width: 20px;
            margin-top: 2px;
        }
 
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
 
        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 1em;
        }
 
        .btn-primary {
            background: linear-gradient(135deg, #0066cc 0%, #00ccff 100%);
            color: white;
        }
 
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 102, 204, 0.3);
        }
 
        .btn-secondary {
            background: #f0f0f0;
            color: #0066cc;
            border: 2px solid #0066cc;
        }
 
        .btn-secondary:hover {
            background: #e0e0e0;
        }
 
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #0066cc;
        }
 
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0066cc;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
 
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
 
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin: 20px;
            border: 2px solid #f5c6cb;
        }
 
        .empty-message {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 1.1em;
        }
 
        @media (max-width: 768px) {
            .calendar-header h1 {
                font-size: 2em;
            }
 
            .day {
                min-height: 120px;
            }
 
            .event-badge {
                font-size: 0.7em;
                padding: 4px 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="calendar-card">
            <div class="calendar-header">
                <h1 id="month-year">THÁNG 3/2026</h1>
            </div>
 
            <div class="calendar-body">
                <div id="loading" class="loading">
                    <div class="loading-spinner"></div>
                    <p style="font-size: 1.1em;">Đang tải lịch...</p>
                </div>
 
                <div id="calendar" style="display: none;">
                    <div class="weekdays">
                        <div class="weekday">Mon</div>
                        <div class="weekday">Tue</div>
                        <div class="weekday">Wed</div>
                        <div class="weekday">Thu</div>
                        <div class="weekday">Fri</div>
                        <div class="weekday">Sat</div>
                        <div class="weekday">Sun</div>
                    </div>
                    <div class="days" id="days-container"></div>
                </div>
 
                <div id="error" style="display: none;"></div>
                <div id="empty" style="display: none;" class="empty-message">
                    <i class="fas fa-calendar" style="color: #0066cc; font-size: 2em; margin-bottom: 10px;"></i>
                    <p>Không có giải đấu trong tháng này</p>
                </div>
            </div>
        </div>
    </div>
 
    <!-- Modal -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-header">
                <h2 id="modal-title">Chi tiết giải đấu</h2>
            </div>
            <div class="modal-body">
                <p><i class="fas fa-trophy"></i><strong>Tên giải:</strong><br/><span id="modal-name">-</span></p>
                <p><i class="fas fa-tag"></i><strong>Loại:</strong><br/><span id="modal-type">-</span></p>
                <p><i class="fas fa-calendar"></i><strong>Ngày:</strong><br/><span id="modal-date">-</span></p>
                <p><i class="fas fa-user"></i><strong>Ban tổ chức:</strong><br/><span id="modal-organizer">-</span></p>
                <p><i class="fas fa-book"></i><strong>Thể lệ:</strong><br/><span id="modal-rules">-</span></p>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" id="join-btn" onclick="joinTournament()">
                    <i class="fas fa-link"></i> Tham gia giải
                </button>
                <button class="btn btn-secondary" onclick="closeModal()">Đóng</button>
            </div>
        </div>
    </div>
 
    <script>
        // Configuration - THAY ĐỔI URL TẠI ĐÂY
        const API_URL = 'https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrRFPdArIgdpnpKxQNKKUgWao_nFC_nnR-xFulDgvVzC2DplxYAXpA67Z_SN9duRxoi2Ucb4jW_BH4ErvPq0zR8WQD2w32t5D7b6wQK0FtCXO0nvq43P0baytcEF3C2RL3h9Fc2FNOi-Q2D_zTjEz1y9_9Vd8Cx0yoQ4stQWg69IBHE1jiOXjSvkU0yn0fQGd5cjLdGZNWw94A5MSEfs-nFHpB3RWzBO539MtJRVS01jL5vqmHezNy7GpJJDDeLi9Eipl2gPiGf2zBMAbqQhH-sLY8bcZlksmXw2a1DO&lib=Mceo38KDTdGwYLEUtgmMWTiAHypOq2Yba';
 
        let tournaments = [];
        let selectedEvent = null;
 
        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            loadTournaments();
        });
 
        // Load tournaments from Google Apps Script
        async function loadTournaments() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                tournaments = data.tournaments || [];
                
                // Show calendar
                document.getElementById('loading').style.display = 'none';
                
                if (tournaments.length === 0) {
                    document.getElementById('empty').style.display = 'block';
                } else {
                    document.getElementById('calendar').style.display = 'block';
                    renderCalendar();
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerHTML = 
                    `<div class="error"><i class="fas fa-exclamation-circle"></i> Lỗi: ${error.message}</div>`;
            }
        }
 
        // Render calendar
        function renderCalendar() {
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth();
            
            // Update header
            const monthNames = ['Tháng 1', 'Tháng 2', 'Tháng 3', 'Tháng 4', 'Tháng 5', 'Tháng 6',
                'Tháng 7', 'Tháng 8', 'Tháng 9', 'Tháng 10', 'Tháng 11', 'Tháng 12'];
            document.getElementById('month-year').textContent = `${monthNames[month]}/${year}`;
            
            // Get first day (0=Sunday, 1=Monday, ..., 6=Saturday)
            const firstDay = new Date(year, month, 1).getDay();
            // Convert to Monday=0 format
            const startDay = firstDay === 0 ? 6 : firstDay - 1;
            
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();
            
            // Create days array
            const days = [];
            
            // Previous month days
            for (let i = startDay - 1; i >= 0; i--) {
                days.push({
                    day: daysInPrevMonth - i,
                    isCurrentMonth: false
                });
            }
            
            // Current month days
            for (let i = 1; i <= daysInMonth; i++) {
                days.push({
                    day: i,
                    isCurrentMonth: true
                });
            }
            
            // Next month days
            const remainingDays = 42 - days.length; // 6 rows × 7 days
            for (let i = 1; i <= remainingDays; i++) {
                days.push({
                    day: i,
                    isCurrentMonth: false
                });
            }
            
            // Render days
            const container = document.getElementById('days-container');
            container.innerHTML = '';
            
            days.forEach(dayObj => {
                const dayEl = document.createElement('div');
                dayEl.className = 'day';
                
                if (!dayObj.isCurrentMonth) {
                    dayEl.classList.add('other-month');
                }
                
                // Check if today
                if (dayObj.isCurrentMonth && 
                    today.getFullYear() === year && 
                    today.getMonth() === month && 
                    today.getDate() === dayObj.day) {
                    dayEl.classList.add('today');
                }
                
                const dayNumber = document.createElement('div');
                dayNumber.className = 'day-number';
                dayNumber.textContent = dayObj.day;
                dayEl.appendChild(dayNumber);
                
                // Add events for this day
                const eventsContainer = document.createElement('div');
                eventsContainer.className = 'day-events';
                
                if (dayObj.isCurrentMonth) {
                    const dayTournaments = tournaments.filter(t => {
                        const tDate = new Date(t.startTime);
                        return tDate.getFullYear() === year && 
                               tDate.getMonth() === month && 
                               tDate.getDate() === dayObj.day;
                    });
                    
                    dayTournaments.forEach(tournament => {
                        const badge = document.createElement('div');
                        badge.className = 'event-badge';
                        badge.textContent = tournament.eventName || 'Tournament';
                        badge.onclick = (e) => {
                            e.stopPropagation();
                            openModal(tournament);
                        };
                        eventsContainer.appendChild(badge);
                    });
                }
                
                dayEl.appendChild(eventsContainer);
                container.appendChild(dayEl);
            });
        }
 
        // Modal
        function openModal(tournament) {
            selectedEvent = tournament;
            document.getElementById('modal-title').textContent = tournament.eventName || 'Chi tiết giải đấu';
            document.getElementById('modal-name').textContent = tournament.eventName || '-';
            document.getElementById('modal-type').textContent = tournament.eventType || '-';
            document.getElementById('modal-organizer').textContent = tournament.organizer || '-';
            
            const date = new Date(tournament.startTime);
            document.getElementById('modal-date').textContent = date.toLocaleString('vi-VN');
            
            const rules = tournament.gameRules || '-';
            document.getElementById('modal-rules').textContent = rules;
            
            const joinBtn = document.getElementById('join-btn');
            if (tournament.joinLink) {
                joinBtn.style.display = 'block';
            } else {
                joinBtn.style.display = 'none';
            }
            
            document.getElementById('eventModal').style.display = 'block';
        }
 
        function closeModal() {
            document.getElementById('eventModal').style.display = 'none';
            selectedEvent = null;
        }
 
        function joinTournament() {
            if (selectedEvent && selectedEvent.joinLink) {
                window.open(selectedEvent.joinLink, '_blank');
            }
        }
 
        // Close modal when clicking outside
        window.onclick = (event) => {
            const modal = document.getElementById('eventModal');
            if (event.target === modal) {
                closeModal();
            }
        };
    </script>
